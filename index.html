<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Calculadora</title>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="num"  id="num">0</div>
    </div>
    <div class="buttons">
      <button class="btn fn danger" data-a="ac">AC</button>
      <button class="btn fn" data-a="+/-">+/−</button>
      <button class="btn fn" data-a="%">%</button>
      <button class="btn op" data-a="÷">÷</button>
      <button class="btn" data-a="7">7</button>
      <button class="btn" data-a="8">8</button>
      <button class="btn" data-a="9">9</button>
      <button class="btn op" data-a="×">×</button>
      <button class="btn" data-a="4">4</button>
      <button class="btn" data-a="5">5</button>
      <button class="btn" data-a="6">6</button>
      <button class="btn op" data-a="−">−</button>
      <button class="btn" data-a="1">1</button>
      <button class="btn" data-a="2">2</button>
      <button class="btn" data-a="3">3</button>
      <button class="btn op" data-a="+">+</button>
      <button class="btn zero" data-a="0">0</button>
      <button class="btn" data-a=".">.</button>
      <button class="btn eq" data-a="=">=</button>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
